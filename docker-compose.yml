version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: chart-minio
    ports:
      - "19200:9000"
      - "19201:9001"
    volumes:
      - ./volume/minio/data:/data
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=Xmz@323!
    command: server /data --console-address ":9001"
  viz-chart-api:
    image: ghcr.io/9999-12-31/plugin-viz-chart/viz-chart-api:0.0.1
    container_name: viz-chart-api
    ports:
      - "3100:3000"
    environment:
      MINIO_ENDPOINT: host.docker.internal
      MINIO_PORT: 19200
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: gOTrJZGg9T03kb804inP
      MINIO_SECRET_KEY: gLapxVyPECXGvRnDFx7Xr8TXXtWxUtRiBIDkKxrK
      MINIO_BUCKET: chart-images
      # 注意：这里的 MINIO_PUBLIC_DOMAIN 用于生成图片的 URL，需要和 minio 服务的端口映射保持一致
      MINIO_PUBLIC_DOMAIN: "http://localhost:19200"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # 添加 volumes 配置，将本地 index.js 挂载到容器内对应位置
    volumes:
      - ./src/index.js:/usr/src/app/src/index.js
  viz-chart-mcp-sse:
    image: ghcr.io/9999-12-31/plugin-viz-chart/viz-chart-mcp-sse:0.0.1
    container_name: viz-chart-mcp-sse
    restart: unless-stopped
    ports:
      - "1123:1123"
    environment:
      - VIS_REQUEST_SERVER=http://viz-chart-api:3000/generate
  viz-chart-mcp-streamable:
    image: ghcr.io/9999-12-31/plugin-viz-chart/viz-chart-mcp-streamable:0.0.1
    container_name: viz-chart-mcp-streamable
    restart: unless-stopped
    ports:
      - "1122:1122"
    environment:
      - VIS_REQUEST_SERVER=http://viz-chart-api:3000/generate